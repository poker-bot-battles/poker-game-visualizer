<div class="poker-table">
  <div class="poker-table__community">
    <div class="poker-table__community__pot">
      <div class="poker-table__community__pot__amount">
        Pot: ${{ board.pot! }}
      </div>
      <div class="poker-table__community__pot__stack">
        <app-stacker [valor]="board.pot!"></app-stacker>
      </div>
    </div>
    <div class="poker-table__community__carts">
      <app-card-group [cards]="board.cards!" [overlap]="true"></app-card-group>
    </div>
    <div class="poker-table__blinds">
      <div>Blinds: {{ board.smallBlind }} / {{ board.bigBlind }}</div>
    </div>
  </div>

  <div class="poker-table__game">
    <div class="players">
      <div class="player num--1">
        <app-poker-player
          class="player-component"
          [playerNo]="1"
          [player]="getPlayer(0)"
          [imgurl]="
            '/assets/images/robots/eve.png'
          "
        >
        </app-poker-player>
      </div>
      <div class="player num--2">
        <app-poker-player
          class="player-component"
          [playerNo]="2"
          [player]="getPlayer(1)"
          [imgurl]="
            '/assets/images/robots/wall-e.webp'
          "
        ></app-poker-player>
      </div>
      <div class="player num--3">
        <app-poker-player
          class="player-component"
          [playerNo]="3"
          [player]="getPlayer(2)"
          [imgurl]="
            '/assets/images/robots/r2-d2.png'
          "
        >
        </app-poker-player>
      </div>
      <div class="player num--4">
        <app-poker-player
          class="player-component"
          [playerNo]="4"
          [player]="getPlayer(3)"
          [imgurl]="'/assets/images/robots/c3-po.png'"
        >
        </app-poker-player>
      </div>
      <div class="player num--5">
        <app-poker-player
          class="player-component"
          [playerNo]="5"
          [player]="getPlayer(4)"
          [imgurl]="
            '/assets/images/robots/clank.webp'
          "
        >
        </app-poker-player>
      </div>
      <div class="player num--6">
        <app-poker-player
          class="player-component"
          [playerNo]="6"
          [player]="getPlayer(5)"
          [imgurl]="
            '/assets/images/robots/iron-giant.webp'
          "
        >
        </app-poker-player>
      </div>
      <div class="player num--7">
        <app-poker-player
          class="player-component"
          [playerNo]="7"
          [player]="getPlayer(6)"
          [imgurl]="
            '/assets/images/robots/atlas.png'
          "
        >
        </app-poker-player>
      </div>
      <div class="player num--8">
        <app-poker-player
          class="player-component"
          [playerNo]="8"
          [player]="getPlayer(7)"
          [imgurl]="
            '/assets/images/robots/p-body.png'
          "
        >
        </app-poker-player>
      </div>
      <div class="player num--9">
        <app-poker-player
          class="player-component"
          [playerNo]="9"
          [player]="getPlayer(8)"
          [imgurl]="
            '/assets/images/robots/claptrap.webp'
          "
        >
        </app-poker-player>
      </div>
      <div class="player num--10">
        <app-poker-player
          class="player-component"
          [playerNo]="10"
          [player]="getPlayer(9)"
          [imgurl]="
            '/assets/images/robots/bb-8.png'
          "
        >
        </app-poker-player>
      </div>
    </div>
  </div>
</div>
